<!doctype html>
<html lang="en">
<head>
    <title>Password Generator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
    <div id="background">
        <div id="text-content">
            <h1 class="heading white"> Generate a </h1>
            <h1 class="heading green"> random password </h1>

            <p id="banner"> Never use an insecure password again. </p>

            <input id="input" type="number" placeholder="Password length">

            <button id="btn-generate"> Generate passwords </button>

            <hr>

            <div id="passwords">
                <button id="pw1" class="pw-btn"> pw1 </button>
                <button id="pw2" class="pw-btn"> pw2 </button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
